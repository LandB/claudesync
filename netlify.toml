[build]
  base    = "dashboard"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/api/*"
  to     = "https://pkiufpjrwcdvvcpxdubf.supabase.co/functions/v1/:splat"
  status = 200
  force  = true

  [redirects.headers]
    X-Forwarded-Host = "claudesync.netlify.app"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
